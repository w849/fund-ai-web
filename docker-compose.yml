version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: fund-ai-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build: .
    container_name: fund-ai-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=http://117.72.211.91:3000
      - LOG_LEVEL=info
      - DEEPSEEK_API_KEY=<YOUR_DEEPSEEK_API_KEY>
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
