name: CI - 代码检查与测试

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'

jobs:
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存后端 node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-node-${{ hashFiles('server/package-lock.json') }}

      - name: 安装后端依赖
        run: npm ci
        working-directory: server

      - name: 缓存前端 node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: 安装前端依赖
        run: npm ci
        working-directory: client

      - name: 后端 ESLint 检查
        run: npx eslint src/ --ext .js --max-warnings 50 || true
        working-directory: server
        continue-on-error: true

      - name: 前端 ESLint 检查
        run: npx eslint src/ --ext .vue,.js --max-warnings 50 || true
        working-directory: client
        continue-on-error: true

  test:
    name: 单元测试
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存后端 node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-node-${{ hashFiles('server/package-lock.json') }}

      - name: 安装后端依赖
        run: npm ci
        working-directory: server

      - name: 运行后端单元测试
        run: npm test -- --coverage
        working-directory: server
        env:
          NODE_ENV: test
          DEEPSEEK_API_KEY: sk-test-mock-key
          REDIS_HOST: ''
          LOG_LEVEL: silent

      - name: 上传后端覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/

      - name: 缓存前端 node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: 安装前端依赖
        run: npm ci
        working-directory: client

      - name: 运行前端单元测试
        run: npm test -- --coverage
        working-directory: client
        env:
          NODE_ENV: test

      - name: 上传前端覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/

      - name: 前端生产构建验证
        run: npm run build
        working-directory: client
        env:
          NODE_ENV: production

  e2e:
    name: E2E 测试
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存后端 node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-node-${{ hashFiles('server/package-lock.json') }}

      - name: 安装后端依赖
        run: npm ci
        working-directory: server

      - name: 缓存前端 node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-node-${{ hashFiles('client/package-lock.json') }}

      - name: 安装前端依赖
        run: npm ci
        working-directory: client

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium
        working-directory: .

      - name: 运行 E2E 测试
        run: npx playwright test
        env:
          NODE_ENV: test

      - name: 上传 E2E 测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
